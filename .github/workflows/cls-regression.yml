name: CLS Regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  cls:
    name: Voting CLS check on term pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    env:
      BASE_URL: http://localhost:8080
      TERM_SLUG: ${{ vars.CLS_TERM_SLUG || '67' }}
      CLS_THRESHOLD: ${{ vars.CLS_THRESHOLD || '0.05' }}
      VOTE_CLICKS: '6'
      CLS_ARTIFACT_DIR: ${{ github.workspace }}/cls-artifacts
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests (timezone/DST + others)
        run: bun run test

      - name: Build app
        run: bun run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Start preview server
        run: |
          bun run preview --port 8080 --host 127.0.0.1 > /tmp/preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          for i in $(seq 1 60); do
            if curl -fsS "$BASE_URL" > /dev/null 2>&1; then
              echo "Preview is up"
              exit 0
            fi
            sleep 1
          done
          echo "Preview failed to start" >&2
          cat /tmp/preview.log >&2
          exit 1

      - name: Run CLS regression check
        id: cls
        run: python3 tests/cls_vote.py

      - name: Run Back-button scroll restoration check
        id: back
        env:
          BACK_ARTIFACT_DIR: ${{ github.workspace }}/back-artifacts
          SCROLL_TOLERANCE: '8'
        run: python3 tests/back_scroll_restore.py

      - name: Run ticker realtime-burst stress test
        id: stress
        env:
          STRESS_ARTIFACT_DIR: ${{ github.workspace }}/stress-artifacts
          STRESS_DURATION_MS: '10000'
          STRESS_BURSTS: '200'
          STRESS_LONGTASK_MS: '1500'
          STRESS_LONGTASK_MAX_MS: '250'
        run: python3 tests/ticker_stress.py

      - name: Run Timezone + DST daily-flip check
        id: dst_flip
        env:
          DST_ARTIFACT_DIR: ${{ github.workspace }}/dst-flip-artifacts
        run: python3 tests/timezone_dst_flip.py

      - name: Run Sleep/Resume daily-flip check
        id: sleep_resume
        env:
          SLEEP_RESUME_ARTIFACT_DIR: ${{ github.workspace }}/sleep-resume-artifacts
        run: python3 tests/sleep_resume_flip.py

      - name: Upload Sleep/Resume artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sleep-resume-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/sleep-resume-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Timezone/DST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dst-flip-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/dst-flip-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Pro gating check
        id: gating
        env:
          GATING_ARTIFACT_DIR: ${{ github.workspace }}/gating-artifacts
        run: python3 tests/pro_gating.py

      - name: Run Gated no-writes check
        id: gated_nowrite
        env:
          GATED_NOWRITE_ARTIFACT_DIR: ${{ github.workspace }}/gated-nowrite-artifacts
        # Exit code 2 = skipped (signed-in user is Pro, so gating doesn't apply).
        run: |
          set +e
          python3 tests/gated_no_writes.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Gated no-writes test skipped (Pro session)."
            exit 0
          fi
          exit $rc

      - name: Upload Gated no-writes artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gated-nowrite-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/gated-nowrite-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Pro voting check
        id: pro_voting
        env:
          PRO_VOTING_ARTIFACT_DIR: ${{ github.workspace }}/pro-voting-artifacts
        # Exit code 2 = skipped (no injected Pro session available in CI).
        run: |
          set +e
          python3 tests/pro_voting.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Pro voting test skipped (no Pro session in CI)."
            exit 0
          fi
          exit $rc

      - name: Upload Pro voting artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pro-voting-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/pro-voting-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Free-tier voting check
        id: free_voting
        env:
          FREE_VOTING_ARTIFACT_DIR: ${{ github.workspace }}/free-voting-artifacts
        # Exit code 2 = skipped (no free-tier session injected in CI).
        run: |
          set +e
          python3 tests/free_voting.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Free voting test skipped (no free-tier session in CI)."
            exit 0
          fi
          exit $rc

      - name: Upload Free voting artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-voting-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/free-voting-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Pro upgrade flow check
        id: pro_upgrade
        env:
          PRO_UPGRADE_ARTIFACT_DIR: ${{ github.workspace }}/pro-upgrade-artifacts
          PRO_FIXTURE_SERVICE_KEY: ${{ secrets.PRO_FIXTURE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        # Exit code 2 = skipped (no service-role key or no free session in CI).
        run: |
          set +e
          python3 tests/pro_upgrade_flow.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Pro upgrade flow test skipped (missing fixture secret or session)."
            exit 0
          fi
          exit $rc

      - name: Upload Pro upgrade artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pro-upgrade-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/pro-upgrade-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Pro Year+OAT voting check
        id: pro_year_oat
        env:
          PRO_YEAR_OAT_ARTIFACT_DIR: ${{ github.workspace }}/pro-year-oat-artifacts
          PRO_FIXTURE_SERVICE_KEY: ${{ secrets.PRO_FIXTURE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        # Exit code 2 = skipped (no session or no fixture key to upgrade).
        run: |
          set +e
          python3 tests/pro_year_oat_voting.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Pro Year+OAT voting test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Pro Year+OAT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pro-year-oat-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/pro-year-oat-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Leaderboard net-updates check
        id: leaderboard_net
        env:
          LEADERBOARD_NET_ARTIFACT_DIR: ${{ github.workspace }}/leaderboard-net-artifacts
          PRO_FIXTURE_SERVICE_KEY: ${{ secrets.PRO_FIXTURE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        # Exit code 2 = skipped (no session or no fixture key to upgrade).
        run: |
          set +e
          python3 tests/leaderboard_net_updates.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Leaderboard net-updates test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Leaderboard net-updates artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-net-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/leaderboard-net-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Free gated-CTA clicks check
        id: free_gated_cta
        env:
          FREE_GATED_CTA_ARTIFACT_DIR: ${{ github.workspace }}/free-gated-cta-artifacts
        # Exit code 2 = skipped (no session, or session is Pro).
        run: |
          set +e
          python3 tests/free_gated_cta_clicks.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Free gated-CTA clicks test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Free gated-CTA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-gated-cta-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/free-gated-cta-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Gated REST-rejected check
        id: gated_rest
        env:
          GATED_REST_ARTIFACT_DIR: ${{ github.workspace }}/gated-rest-artifacts
        # Exit code 2 = skipped (no non-Pro session injected).
        run: |
          set +e
          python3 tests/gated_rest_rejected.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Gated REST-rejected test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Gated REST-rejected artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gated-rest-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/gated-rest-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Ticker+sidebar focus check
        id: ticker_focus
        env:
          TICKER_FOCUS_ARTIFACT_DIR: ${{ github.workspace }}/ticker-focus-artifacts
        # Exit code 2 = skipped (Pro session or /vote didn't render).
        run: |
          set +e
          python3 tests/ticker_sidebar_focus.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Ticker+sidebar focus test skipped."
            exit 0
          fi
          exit $rc

      - name: Run Free-tier search limit + streak check
        id: free_search_limit
        env:
          FREE_SEARCH_LIMIT_ARTIFACT_DIR: ${{ github.workspace }}/free-search-limit-artifacts
          PRO_FIXTURE_SERVICE_KEY: ${{ secrets.PRO_FIXTURE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        # Exit code 2 = skipped (no session, no service-key fixture, or Pro session).
        run: |
          set +e
          python3 tests/free_search_limit.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Free search-limit test skipped."
            exit 0
          fi
          exit $rc

      - name: Run Streak persistence check
        id: streak_persistence
        env:
          STREAK_ARTIFACT_DIR: ${{ github.workspace }}/streak-artifacts
          PRO_FIXTURE_SERVICE_KEY: ${{ secrets.PRO_FIXTURE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        # Exit code 2 = skipped (no session, no service-key fixture, or Pro session).
        run: |
          set +e
          python3 tests/streak_persistence.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Streak persistence test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Streak persistence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streak-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/streak-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Free OAT locked check
        id: free_oat_locked
        env:
          FREE_OAT_LOCKED_ARTIFACT_DIR: ${{ github.workspace }}/free-oat-locked-artifacts
        # Exit code 2 = skipped (no free session, or OAT didn't render).
        run: |
          set +e
          python3 tests/free_oat_locked.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Free OAT locked test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Free OAT locked artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-oat-locked-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/free-oat-locked-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Lock CTA a11y check
        id: lock_cta_a11y
        env:
          LOCK_CTA_A11Y_ARTIFACT_DIR: ${{ github.workspace }}/lock-cta-a11y-artifacts
        # Exit code 2 = skipped (no free session, or boards didn't render).
        run: |
          set +e
          python3 tests/lock_cta_a11y.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Lock CTA a11y test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Lock CTA a11y artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lock-cta-a11y-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/lock-cta-a11y-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Pro in-place upgrade check
        id: pro_upgrade_inplace
        env:
          PRO_FIXTURE_SERVICE_KEY: ${{ secrets.PRO_FIXTURE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PRO_UPGRADE_INPLACE_ARTIFACT_DIR: ${{ github.workspace }}/pro-upgrade-inplace-artifacts
        # Exit code 2 = skipped (no session / no service key / already Pro).
        run: |
          set +e
          python3 tests/pro_upgrade_inplace.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Pro in-place upgrade test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Pro in-place upgrade artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pro-upgrade-inplace-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/pro-upgrade-inplace-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Run Free glossary gating check
        id: free_glossary_gated
        env:
          PRO_FIXTURE_SERVICE_KEY: ${{ secrets.PRO_FIXTURE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          FREE_GLOSSARY_ARTIFACT_DIR: ${{ github.workspace }}/free-glossary-gated-artifacts
        # Exit code 2 = skipped (no session / no service key).
        run: |
          set +e
          python3 tests/free_glossary_gated.py
          rc=$?
          if [ "$rc" -eq 2 ]; then
            echo "Free glossary gating test skipped."
            exit 0
          fi
          exit $rc

      - name: Upload Free glossary gating artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-glossary-gated-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/free-glossary-gated-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Free search-limit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: free-search-limit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/free-search-limit-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Ticker focus artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ticker-focus-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ticker-focus-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Pro gating artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pro-gating-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/gating-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload ticker stress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ticker-stress-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/stress-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Back-button debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: back-scroll-debug-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/back-artifacts
          retention-days: 14
          if-no-files-found: ignore

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/preview.pid ]; then kill "$(cat /tmp/preview.pid)" || true; fi

      - name: Collect preview log
        if: always()
        run: |
          mkdir -p "$CLS_ARTIFACT_DIR"
          cp /tmp/preview.log "$CLS_ARTIFACT_DIR/preview.log" 2>/dev/null || true

      - name: Upload CLS debug artifacts
        if: failure()
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: cls-debug-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.CLS_ARTIFACT_DIR }}
          retention-days: 14
          if-no-files-found: ignore

      - name: Comment CLS failure on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = process.env.CLS_ARTIFACT_DIR;
            const threshold = process.env.CLS_THRESHOLD;
            let cls = 'n/a';
            let votes = process.env.VOTE_CLICKS;
            let slug = process.env.TERM_SLUG;
            try {
              const summary = JSON.parse(
                fs.readFileSync(path.join(dir, 'cls-summary.json'), 'utf8'),
              );
              cls = Number(summary.cls).toFixed(5);
              votes = summary.votes ?? votes;
              slug = summary.slug ?? slug;
            } catch (err) {
              core.warning(`No cls-summary.json: ${err.message}`);
            }
            const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}#artifacts`;
            const body = [
              '### ❌ CLS regression check failed',
              '',
              `- **CLS:** \`${cls}\` (threshold \`${threshold}\`)`,
              `- **Term page:** \`/trends/${slug}\` · ${votes} vote clicks`,
              `- **Debug artifact:** [cls-debug-${context.runId}-${process.env.GITHUB_RUN_ATTEMPT}](${artifactUrl}) — trace.zip, console.log, network.log, final.png, preview.log`,
              '',
              `<sub>Run: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})</sub>`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });